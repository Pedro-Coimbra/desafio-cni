<div class="app-shell">
  <p-toast position="top-right" />

  <header class="app-header">
    <div class="brand-block">
      <p class="eyebrow">Desafio Analista Front-End</p>
      <a class="brand-link" routerLink="/chamados">
        <span class="brand-mark" aria-hidden="true">C</span>
        <div>
          <h1>{{ appName }}</h1>
          <p>Gerencie solicitações internas com clareza, velocidade e contexto.</p>
        </div>
      </a>
    </div>

    <nav class="app-nav" aria-label="Navegação principal">
      <a
        pButton
        label="Chamados"
        icon="pi pi-list"
        severity="secondary"
        [text]="true"
        routerLink="/chamados"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
      ></a>

      <a
        pButton
        label="Novo chamado"
        icon="pi pi-plus"
        routerLink="/chamados/novo"
      ></a>
    </nav>
  </header>

  <main class="page-content">
    <router-outlet />
  </main>
</div>
